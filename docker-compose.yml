services:
  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: commissions
      POSTGRES_PASSWORD: commissions
      POSTGRES_DB: commissions
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U commissions"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
